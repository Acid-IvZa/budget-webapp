<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Семейный бюджет</title>
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Бюджет" />
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/icon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icon-180.png" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --card-soft: #f9fafb;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --danger: #dc2626;
      --success: #16a34a;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --shadow-strong: 0 14px 34px rgba(15, 23, 42, 0.12);
      --radius: 18px;
      --nav-height: 76px;
      --screen-transition: 320ms cubic-bezier(.22,.61,.36,1);
      --details-transition: 280ms cubic-bezier(.22,.61,.36,1);
      --card-transition: 320ms cubic-bezier(.22,.61,.36,1);
      --number-transition: 360ms cubic-bezier(.22,.61,.36,1);
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0f172a;
      --card: #111827;
      --card-soft: #172033;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --line: rgba(148, 163, 184, 0.18);
      --accent: #60a5fa;
      --accent-soft: rgba(96, 165, 250, 0.18);
      --danger: #f87171;
      --success: #4ade80;
      --shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
      --shadow-strong: 0 16px 38px rgba(0, 0, 0, 0.36);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      height: 100%;
      overflow: hidden;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }

    .theme-toggle {
      position: fixed;
      top: max(14px, env(safe-area-inset-top));
      right: calc(50% - 260px + 16px);
      z-index: 120;
      width: 44px;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.88);
      color: var(--text);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 19px;
      cursor: pointer;
      transition:
        transform 180ms ease,
        background var(--card-transition),
        color var(--card-transition),
        border-color var(--card-transition),
        box-shadow var(--card-transition);
    }

    :root[data-theme="dark"] .theme-toggle {
      background: rgba(17, 24, 39, 0.88);
    }

    .theme-toggle:active {
      transform: scale(0.96);
    }

    .screens {
      position: relative;
      height: calc(100vh - var(--nav-height));
      overflow: hidden;
    }

    .screen {
      position: absolute;
      inset: 0;
      height: 100%;
      overflow-y: auto;
      padding: 18px 16px 18px;
      overscroll-behavior: contain;
      background: var(--bg);
      visibility: hidden;
      pointer-events: none;
      transform: translateX(0);
      opacity: 0;
      transition:
        transform var(--screen-transition),
        opacity var(--screen-transition),
        visibility 0s linear var(--screen-transition);
      will-change: transform, opacity;
    }

    .screen.active {
      visibility: visible;
      pointer-events: auto;
      opacity: 1;
      z-index: 3;
      transition:
        transform var(--screen-transition),
        opacity var(--screen-transition),
        visibility 0s linear 0s;
    }

    .screen.before {
      visibility: visible;
      opacity: 0.96;
      transform: translateX(-26%);
      z-index: 1;
    }

    .screen.after {
      visibility: visible;
      opacity: 0.96;
      transform: translateX(26%);
      z-index: 1;
    }

    .screen.enter-from-right {
      visibility: visible;
      opacity: 1;
      transform: translateX(100%);
      z-index: 4;
      pointer-events: auto;
    }

    .screen.enter-from-left {
      visibility: visible;
      opacity: 1;
      transform: translateX(-100%);
      z-index: 4;
      pointer-events: auto;
    }

    .screen.animate-in {
      transform: translateX(0);
      opacity: 1;
    }

    .screen.exit-to-left {
      visibility: visible;
      opacity: 0.92;
      transform: translateX(-100%);
      z-index: 2;
      pointer-events: none;
      transition:
        transform var(--screen-transition),
        opacity var(--screen-transition),
        visibility 0s linear 0s;
    }

    .screen.exit-to-right {
      visibility: visible;
      opacity: 0.92;
      transform: translateX(100%);
      z-index: 2;
      pointer-events: none;
      transition:
        transform var(--screen-transition),
        opacity var(--screen-transition),
        visibility 0s linear 0s;
    }

    .topbar {
      margin-bottom: 16px;
      padding-right: 56px;
    }

    .title {
      font-size: 26px;
      font-weight: 800;
      margin: 0 0 6px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin: 0;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 14px;
      transform-origin: center top;
    }

    .select {
      width: 100%;
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--card);
      padding: 12px 14px;
      font-size: 16px;
      color: var(--text);
      outline: none;
    }

    .select:focus {
      border-color: var(--accent);
    }

    .table-like {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }

    .row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .row:first-child {
      padding-top: 0;
    }

    .label {
      font-size: 16px;
      font-weight: 600;
    }

    .value {
      font-size: 18px;
      font-weight: 800;
      text-align: right;
      white-space: nowrap;
    }

    .muted {
      color: var(--muted);
    }

    .danger {
      color: var(--danger);
    }

    .success {
      color: var(--success);
    }

    .expense-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 10px;
      opacity: 0;
      transform: translateY(10px);
    }

    .expense-card.show {
      opacity: 1;
      transform: translateY(0);
    }

    .expense-title {
      font-size: 17px;
      font-weight: 800;
      margin: 0 0 10px;
    }

    .expense-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 12px;
      align-items: center;
    }

    .expense-grid .k {
      color: var(--muted);
      font-size: 14px;
    }

    .expense-grid .v {
      font-size: 15px;
      font-weight: 700;
      text-align: right;
      white-space: nowrap;
    }

    .empty {
      padding: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
    }

    .updated {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--line);
      height: var(--nav-height);
      display: flex;
      justify-content: center;
      z-index: 100;
      transition:
        background var(--card-transition),
        border-color var(--card-transition);
    }

    :root[data-theme="dark"] .nav {
      background: rgba(17, 24, 39, 0.96);
    }

    .nav-inner {
      width: 100%;
      max-width: 520px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 8px 10px 10px;
    }

    .nav-btn {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      padding: 8px 6px;
      border-radius: 14px;
      transition:
        background var(--card-transition),
        color var(--card-transition),
        transform 180ms ease;
    }

    .nav-btn:active {
      transform: scale(0.97);
    }

    .nav-btn.active {
      color: var(--accent);
      background: var(--accent-soft);
    }

    .icon {
      font-size: 20px;
      line-height: 1;
    }

    .debts-item {
      cursor: pointer;
      user-select: none;
    }

    .debts-item .row {
      margin: 0;
    }

    .debt-details {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transform: translateY(-6px);
      transition:
        max-height var(--details-transition),
        opacity var(--details-transition),
        transform var(--details-transition),
        margin-top var(--details-transition);
      margin-top: 0;
    }

    .debt-details.open {
      max-height: 240px;
      opacity: 1;
      transform: translateY(0);
      margin-top: 8px;
    }

    .debt-details-card {
      background: var(--card-soft);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
    }

    .debt-details-title {
      font-size: 15px;
      font-weight: 800;
      margin: 0 0 10px;
    }

    .debt-details-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 10px;
      align-items: center;
    }

    .debt-details-grid .k {
      font-size: 14px;
      color: var(--muted);
    }

    .debt-details-grid .v {
      font-size: 14px;
      font-weight: 700;
      text-align: right;
      white-space: nowrap;
    }

    #screen-expenses {
      padding-bottom: 0;
      overflow: hidden;
    }

    .expenses-layout {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }

    .expenses-sticky {
      position: sticky;
      top: 0;
      z-index: 5;
      background: var(--bg);
      padding-bottom: 2px;
      transition: background var(--card-transition);
    }

    .expenses-sticky .topbar {
      margin-bottom: 12px;
    }

    .expenses-sticky .card {
      margin-bottom: 6px;
    }

    .expenses-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding-top: 0;
      padding-bottom: 90px;
      overscroll-behavior: contain;
    }

    .screen,
    .card,
    .expense-card,
    .debt-details-card,
    .nav-btn,
    .select,
    .row,
    .value,
    .title,
    .subtitle,
    .updated,
    .label,
    .k,
    .v {
      transition:
        background var(--card-transition),
        color var(--card-transition),
        border-color var(--card-transition),
        box-shadow var(--card-transition),
        transform var(--card-transition),
        opacity var(--card-transition);
    }

    .card-enter {
      animation: cardEnter 360ms cubic-bezier(.22,.61,.36,1) both;
    }

    @keyframes cardEnter {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .value.animating-number {
      animation: numberPulse var(--number-transition);
    }

    @keyframes numberPulse {
      0% {
        opacity: 0.5;
        transform: translateY(6px) scale(0.98);
      }
      60% {
        opacity: 1;
        transform: translateY(0) scale(1.03);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .select:hover {
      box-shadow: var(--shadow);
    }

    .card:hover,
    .expense-card:hover {
      box-shadow: var(--shadow-strong);
    }

    @media (max-width: 520px) {
      .theme-toggle {
        right: 16px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <button id="themeToggle" class="theme-toggle" type="button" aria-label="Переключить тему">🌙</button>

  <div class="app" id="appRoot">
    <div class="screens" id="screensRoot">
      <section id="screen-home" class="screen active">
        <div class="topbar">
          <h1 class="title">Главная</h1>
          <p class="subtitle">Быстрый просмотр основных цифр</p>
        </div>

        <div class="card">
          <select id="homeMonthSelect" class="select"></select>
          <div id="updatedAtHome" class="updated"></div>
        </div>

        <div class="card">
          <div class="table-like" id="homeSummary"></div>
        </div>
      </section>

      <section id="screen-debts" class="screen">
        <div class="topbar">
          <h1 class="title">Свои долги</h1>
          <p id="debtsMonthLabel" class="subtitle"></p>
        </div>

        <div class="card">
          <div class="table-like" id="debtsList"></div>
        </div>
      </section>

      <section id="screen-expenses" class="screen">
        <div class="expenses-layout">
          <div class="expenses-sticky">
            <div class="topbar">
              <h1 class="title">Расходы</h1>
              <p class="subtitle">План, факт и разница по категориям</p>
            </div>

            <div class="card">
              <select id="expensesMonthSelect" class="select"></select>
            </div>
          </div>

          <div class="expenses-scroll" id="expensesScroll">
            <div id="expensesList"></div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <nav class="nav">
    <div class="nav-inner">
      <button class="nav-btn active" data-screen="home">
        <span class="icon">⌂</span>
        <span>Главная</span>
      </button>
      <button class="nav-btn" data-screen="debts">
        <span class="icon">≋</span>
        <span>Свои долги</span>
      </button>
      <button class="nav-btn" data-screen="expenses">
        <span class="icon">▤</span>
        <span>Расходы</span>
      </button>
    </div>
  </nav>

  <script>
    const state = {
      data: null,
      currentMonth: null,
      homeMonth: null,
      expensesMonth: null,
      activeScreen: 'home',
      openDebtCategory: null,
      isAnimating: false,
      theme: 'light'
    };

    const screenOrder = ['home', 'debts', 'expenses'];

    const screens = {
      home: document.getElementById('screen-home'),
      debts: document.getElementById('screen-debts'),
      expenses: document.getElementById('screen-expenses')
    };

    const appRoot = document.getElementById('appRoot');
    const themeToggle = document.getElementById('themeToggle');
    const themeMeta = document.querySelector('meta[name="theme-color"]');
    const homeMonthSelect = document.getElementById('homeMonthSelect');
    const expensesMonthSelect = document.getElementById('expensesMonthSelect');
    const homeSummary = document.getElementById('homeSummary');
    const debtsList = document.getElementById('debtsList');
    const debtsMonthLabel = document.getElementById('debtsMonthLabel');
    const expensesList = document.getElementById('expensesList');
    const updatedAtHome = document.getElementById('updatedAtHome');

    async function init() {
      initTheme();

      try {
        const response = await fetch('./appdata.json', { cache: 'no-store' });
        if (!response.ok) throw new Error('Не удалось загрузить appdata.json');

        const data = await response.json();

        state.data = data;
        state.currentMonth = data?.meta?.current_month || null;
        state.homeMonth = state.currentMonth;
        state.expensesMonth = state.currentMonth;

        setupThemeToggle();
        setupMonthSelectors();
        renderHome();
        renderDebts();
        renderExpenses();
        setupNavigation();
        setupSwipeNavigation();
        refreshScreenPositions();
      } catch (error) {
        document.body.innerHTML = `
          <div style="max-width:520px;margin:0 auto;padding:24px;font-family:Arial,sans-serif;">
            <div style="background:var(--card);border-radius:18px;padding:18px;box-shadow:var(--shadow);">
              <h2 style="margin-top:0;">Ошибка загрузки</h2>
              <p style="color:var(--muted);">${escapeHtml(error.message)}</p>
              <p style="color:var(--muted);">Проверь, что рядом с index.html лежит файл appdata.json.</p>
            </div>
          </div>
        `;
      }
    }

    function initTheme() {
      const savedTheme = localStorage.getItem('budget-theme');
      const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      state.theme = savedTheme || (systemPrefersDark ? 'dark' : 'light');
      applyTheme(state.theme);
    }

    function setupThemeToggle() {
      themeToggle.addEventListener('click', () => {
        const nextTheme = state.theme === 'dark' ? 'light' : 'dark';
        state.theme = nextTheme;
        localStorage.setItem('budget-theme', nextTheme);
        applyTheme(nextTheme);
      });
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);

      const isDark = theme === 'dark';
      themeToggle.textContent = isDark ? '☀️' : '🌙';
      themeToggle.setAttribute('aria-label', isDark ? 'Включить светлую тему' : 'Включить тёмную тему');

      if (themeMeta) {
        themeMeta.setAttribute('content', isDark ? '#0f172a' : '#2563eb');
      }
    }

    function setupNavigation() {
      const navButtons = document.querySelectorAll('.nav-btn');
      navButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          switchScreen(btn.dataset.screen);
        });
      });
    }

    function switchScreen(name, direction = null) {
      if (state.isAnimating) return;
      if (name === state.activeScreen) return;

      const currentIndex = screenOrder.indexOf(state.activeScreen);
      const nextIndex = screenOrder.indexOf(name);
      if (nextIndex === -1) return;

      const currentScreen = screens[state.activeScreen];
      const nextScreen = screens[name];
      const actualDirection = direction || (nextIndex > currentIndex ? 'forward' : 'backward');

      state.isAnimating = true;
      clearAnimationClasses();

      nextScreen.classList.add(actualDirection === 'forward' ? 'enter-from-right' : 'enter-from-left');
      nextScreen.classList.add('active');

      requestAnimationFrame(() => {
        currentScreen.classList.add(actualDirection === 'forward' ? 'exit-to-left' : 'exit-to-right');
        nextScreen.classList.add('animate-in');
      });

      const onDone = () => {
        currentScreen.removeEventListener('transitionend', onDone);

        state.activeScreen = name;
        state.isAnimating = false;

        Object.entries(screens).forEach(([key, screen]) => {
          screen.classList.remove(
            'active',
            'before',
            'after',
            'enter-from-right',
            'enter-from-left',
            'animate-in',
            'exit-to-left',
            'exit-to-right'
          );
          if (key === state.activeScreen) {
            screen.classList.add('active');
          }
        });

        document.querySelectorAll('.nav-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.screen === name);
        });

        refreshScreenPositions();
      };

      currentScreen.addEventListener('transitionend', onDone, { once: true });
    }

    function clearAnimationClasses() {
      Object.values(screens).forEach(screen => {
        screen.classList.remove(
          'before',
          'after',
          'enter-from-right',
          'enter-from-left',
          'animate-in',
          'exit-to-left',
          'exit-to-right'
        );
      });
    }

    function refreshScreenPositions() {
      const activeIndex = screenOrder.indexOf(state.activeScreen);

      Object.entries(screens).forEach(([key, screen]) => {
        screen.classList.remove('before', 'after');
        const index = screenOrder.indexOf(key);
        if (index < activeIndex) screen.classList.add('before');
        if (index > activeIndex) screen.classList.add('after');
      });
    }

    function setupSwipeNavigation() {
      let startX = 0;
      let startY = 0;
      let deltaX = 0;
      let deltaY = 0;
      let tracking = false;

      appRoot.addEventListener('touchstart', (e) => {
        if (!e.touches || e.touches.length !== 1 || state.isAnimating) return;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        deltaX = 0;
        deltaY = 0;
        tracking = true;
      }, { passive: true });

      appRoot.addEventListener('touchmove', (e) => {
        if (!tracking || !e.touches || e.touches.length !== 1) return;
        deltaX = e.touches[0].clientX - startX;
        deltaY = e.touches[0].clientY - startY;
      }, { passive: true });

      appRoot.addEventListener('touchend', () => {
        if (!tracking || state.isAnimating) return;
        tracking = false;

        const absX = Math.abs(deltaX);
        const absY = Math.abs(deltaY);

        if (absX < 60 || absX <= absY) return;

        const currentIndex = screenOrder.indexOf(state.activeScreen);
        if (currentIndex === -1) return;

        if (deltaX < 0 && currentIndex < screenOrder.length - 1) {
          switchScreen(screenOrder[currentIndex + 1], 'forward');
        } else if (deltaX > 0 && currentIndex > 0) {
          switchScreen(screenOrder[currentIndex - 1], 'backward');
        }
      }, { passive: true });
    }

    function setupMonthSelectors() {
      const availableMonths = getAvailableMonths();

      fillMonthSelect(homeMonthSelect, availableMonths, state.homeMonth);
      fillMonthSelect(expensesMonthSelect, availableMonths, state.expensesMonth);

      homeMonthSelect.addEventListener('change', (e) => {
        state.homeMonth = e.target.value;
        renderHome();
      });

      expensesMonthSelect.addEventListener('change', (e) => {
        state.expensesMonth = e.target.value;
        renderExpenses();
      });
    }

    function getAvailableMonths() {
      const mainMonths = (state.data.main || []).map(x => x.month);
      const unique = [...new Set(mainMonths)];
      unique.sort();
      return unique;
    }

    function fillMonthSelect(select, months, selectedMonth) {
      select.innerHTML = '';
      months.forEach(month => {
        const option = document.createElement('option');
        option.value = month;
        option.textContent = formatMonth(month);
        option.selected = month === selectedMonth;
        select.appendChild(option);
      });
    }

    function renderHome() {
      const row = (state.data.main || []).find(x => x.month === state.homeMonth);

      if (!row) {
        homeSummary.innerHTML = `<div class="empty">Нет данных за выбранный месяц.</div>`;
        return;
      }

      const updatedAt = state.data?.meta?.updated_at || '';
      updatedAtHome.textContent = updatedAt ? `Обновлено: ${updatedAt}` : '';

      homeSummary.innerHTML = `
        ${buildSummaryRow('Доход', row.income, getNumberClass(row.income))}
        ${buildSummaryRow('Расход', row.expense, getNumberClass(row.expense))}
        ${buildSummaryRow('Остаток', row.balance, getBalanceClass(row.balance))}
      `;

      const homeCard = homeSummary.closest('.card');
      if (homeCard) {
        homeCard.classList.remove('card-enter');
        void homeCard.offsetWidth;
        homeCard.classList.add('card-enter');
      }

      animateSummaryValues();
    }

    function renderDebts() {
      const currentMonth = state.data?.meta?.current_month || '';
      debtsMonthLabel.textContent = currentMonth ? formatMonth(currentMonth) : '';

      const items = (state.data.debts || []).filter(x => x.month === currentMonth);

      if (!items.length) {
        debtsList.innerHTML = `<div class="empty">Нет данных по долгам.</div>`;
        return;
      }

      debtsList.innerHTML = items.map(item => {
        const isOpen = state.openDebtCategory === item.category;
        const expenseItem = getExpenseByCategory(currentMonth, item.category);

        return `
          <div class="debts-item" data-category="${escapeHtml(item.category)}">
            <div class="row">
              <div class="label">${escapeHtml(item.category)}</div>
              <div class="value ${getBalanceClass(item.amount)}">${formatMoney(item.amount)}</div>
            </div>

            <div class="debt-details ${isOpen ? 'open' : ''}">
              ${
                expenseItem
                  ? `
                    <div class="debt-details-card">
                      <div class="debt-details-title">${escapeHtml(expenseItem.category)}</div>
                      <div class="debt-details-grid">
                        <div class="k">План</div>
                        <div class="v">${formatMoney(expenseItem.plan)}</div>

                        <div class="k">Факт</div>
                        <div class="v">${formatMoney(expenseItem.fact)}</div>

                        <div class="k">Разница</div>
                        <div class="v ${getBalanceClass(expenseItem.difference)}">${formatMoney(expenseItem.difference)}</div>
                      </div>
                    </div>
                  `
                  : `
                    <div class="debt-details-card">
                      <div class="empty" style="padding:8px 0;">Нет данных по расходам для этой категории.</div>
                    </div>
                  `
              }
            </div>
          </div>
        `;
      }).join('');

      const debtsCard = debtsList.closest('.card');
      if (debtsCard) {
        debtsCard.classList.remove('card-enter');
        void debtsCard.offsetWidth;
        debtsCard.classList.add('card-enter');
      }

      bindDebtClicks();
    }

    function bindDebtClicks() {
      const items = document.querySelectorAll('.debts-item');
      items.forEach(item => {
        item.addEventListener('click', () => {
          const category = item.dataset.category;
          state.openDebtCategory = state.openDebtCategory === category ? null : category;
          renderDebts();
        });
      });
    }

    function renderExpenses() {
      const items = (state.data.expenses || []).filter(x => x.month === state.expensesMonth);

      if (!items.length) {
        expensesList.innerHTML = `<div class="card"><div class="empty">Нет данных за выбранный месяц.</div></div>`;
        return;
      }

      expensesList.innerHTML = items.map(item => `
        <div class="expense-card">
          <h3 class="expense-title">${escapeHtml(item.category)}</h3>
          <div class="expense-grid">
            <div class="k">План</div>
            <div class="v">${formatMoney(item.plan)}</div>

            <div class="k">Факт</div>
            <div class="v">${formatMoney(item.fact)}</div>

            <div class="k">Разница</div>
            <div class="v ${getBalanceClass(item.difference)}">${formatMoney(item.difference)}</div>
          </div>
        </div>
      `).join('');

      animateExpenseCards();
    }

    function animateExpenseCards() {
      const cards = expensesList.querySelectorAll('.expense-card');
      cards.forEach((card, index) => {
        card.style.transitionDelay = `${index * 45}ms`;
        requestAnimationFrame(() => {
          card.classList.add('show');
        });
      });
    }

    function getExpenseByCategory(month, category) {
      return (state.data.expenses || []).find(
        x => x.month === month && x.category === category
      ) || null;
    }

    function buildSummaryRow(label, rawValue, valueClass = '') {
      return `
        <div class="row">
          <div class="label">${label}</div>
          <div class="value ${valueClass}" data-value="${Number(rawValue || 0)}">0</div>
        </div>
      `;
    }

    function animateSummaryValues() {
      const values = homeSummary.querySelectorAll('.value[data-value]');
      values.forEach(el => {
        const target = Number(el.dataset.value || 0);
        animateNumber(el, target, 420);
      });
    }

    function animateNumber(element, targetValue, duration = 420) {
      const startValue = 0;
      const startTime = performance.now();

      element.classList.remove('animating-number');
      void element.offsetWidth;
      element.classList.add('animating-number');

      function frame(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = Math.round(startValue + (targetValue - startValue) * eased);

        element.textContent = formatMoney(current);

        if (progress < 1) {
          requestAnimationFrame(frame);
        } else {
          element.textContent = formatMoney(targetValue);
        }
      }

      requestAnimationFrame(frame);
    }

    function formatMoney(value) {
      const number = Number(value || 0);
      return new Intl.NumberFormat('ru-RU').format(number);
    }

    function formatMonth(value) {
      const map = {
        '01': 'Январь',
        '02': 'Февраль',
        '03': 'Март',
        '04': 'Апрель',
        '05': 'Май',
        '06': 'Июнь',
        '07': 'Июль',
        '08': 'Август',
        '09': 'Сентябрь',
        '10': 'Октябрь',
        '11': 'Ноябрь',
        '12': 'Декабрь'
      };

      if (!value || typeof value !== 'string' || value.length !== 7) return value;
      const year = value.slice(0, 4);
      const month = value.slice(5, 7);
      return `${map[month] || month} ${year}`;
    }

    function getBalanceClass(value) {
      const number = Number(value || 0);
      if (number < 0) return 'danger';
      if (number > 0) return 'success';
      return '';
    }

    function getNumberClass(value) {
      const number = Number(value || 0);
      if (number < 0) return 'danger';
      return '';
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    init();
  </script>
</body>
</html>
